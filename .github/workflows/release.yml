name: release

# 手动触发发版：只允许基于 main 发布，输入 semver 版本号。
# 触发方式：GitHub → Actions → release → Run workflow → 填写 version（如 0.1.0）。
#
# 流水线分四段，依赖关系明确，避免多个矩阵任务并发创建同一 GitHub Release：
#   1. prepare：校验 semver、拒绝重复 tag/release、质量门禁（typecheck+lint+test）、
#      生成 CHANGELOG/Release Notes、版本号 bump、打 tag 并推送。唯一写 git 的阶段。
#   2. pi-runtime-smoke：四个 OS/架构组合只生成 unpacked 应用，校验内置 Pi 完整性与运行时隔离。
#   3. build（matrix: macOS / Windows / Linux）：checkout 刚推送的 tag，构建应用与安装包，
#      electron-builder --publish never（不创建 Release），校验本平台预期构件齐全后上传 artifact。
#      任一预期构件缺失即失败（if-no-files-found: error + 显式校验），不以 ignore 掩盖。
#   4. publish：汇总三平台 artifact，再次校验完整构件集，最后用 gh release create
#      统一创建 Release（正文 = 生成的 Release Notes，与仓库 CHANGELOG 对应小节一致）并附全部构件。
#
# 必需 Secrets（仓库 Settings → Secrets → Actions）：
#   - RELEASE_TOKEN: 具备 contents:write 的 fine-grained / PAT，用于推送 tag 与创建 Release、上传构件。
# macOS 分发采用 Ad hoc（无证书）签名：
#   - 不需要任何 Apple 付费开发者证书 / 公证凭据。构建时关闭 electron-builder 身份自动发现
#     （CSC_IDENTITY_AUTO_DISCOVERY=false），由 afterSign 钩子 scripts/ad-hoc-sign.mjs 用 Ad hoc 身份
#     （`-`）整体封装 .app bundle。
#   - 产物未经公证，Gatekeeper 会隔离；用户首次运行需执行
#     `xattr -d com.apple.quarantine /Applications/ai-devflow.app` 放行（见 README 安装说明）。
#   - Ad hoc 应用无法被 Squirrel.Mac 自动安装更新（需相同开发者身份），应用内「立即升级」会引导
#     用户到 GitHub Releases 手动下载新版（updater.ts 检测到 Ad hoc 即走手动下载分支）
#
# 三平台预期构件（publish 会逐一校验）：
#   - macOS:  ai-devflow-<v>-mac-x64.dmg / -mac-arm64.dmg / -mac-x64.zip / -mac-arm64.zip / latest-mac.yml / *.blockmap
#   - Windows: ai-devflow-<v>-win-x64.exe（NSIS）/ latest.yml / *.blockmap
#   - Linux:  ai-devflow-<v>-linux-x64.AppImage / latest-linux.yml
#
# 验证流程：
#   1. 触发后在本仓库 Releases 看到 vX.Y.Z 与三平台安装包及 latest*.yml / blockmap。
#   2. 本地安装旧版（package.json version 低于 X.Y.Z），启动后 electron-updater 检查到更新并下载。
#      Windows / Linux 点击“立即升级”完成自动升级；Ad hoc 签名的 macOS 会打开 GitHub Releases，
#      需手动下载对应架构包并安装（见 docs/architecture.md §11）。

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver 版本号（不含 v 前缀，如 0.1.0）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # 1. 准备：校验 + 质量门禁 + CHANGELOG + 版本号 bump + 打 tag 推送（唯一写 git 的阶段）
  # ---------------------------------------------------------------------------
  prepare:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ inputs.version }}
      version: ${{ inputs.version }}
    steps:
      - name: Validate semver
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "非法 semver：${{ inputs.version }}"
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # 需要完整历史与全部 tag 以生成「上一版本 -> 当前版本」的变更

      - name: Reject duplicate tag/release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} 已存在，拒绝重复发版"
            exit 1
          fi
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} 已存在，拒绝重复发版"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Quality gates (typecheck + lint + test)
        run: |
          pnpm typecheck
          pnpm lint
          pnpm test

      - name: Generate CHANGELOG + Release Notes (prev tag -> current)
        run: |
          node scripts/gen-changelog.mjs "${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --out RELEASE_NOTES.md \
            --update-changelog CHANGELOG.md

      - name: Bump version to ${{ inputs.version }}
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version
          npm --prefix apps/desktop version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit version bump + CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json apps/desktop/package.json CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): v${{ inputs.version }}"

      - name: Tag v${{ inputs.version }}
        run: git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. 内置 Pi 运行时冒烟：四个发布架构分别检查包完整性与隔离。
  # ---------------------------------------------------------------------------
  pi-runtime-smoke:
    needs: prepare
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x64
          - os: macos-14
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: ubuntu-latest
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout prepared tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Linux keyring and display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus-x11 gnome-keyring xvfb libsecret-1-0
          echo "=== libsecret status ==="
          dpkg -l | grep -E "libsecret|gnome-keyring" || echo "(none found)"
          echo "=== DBus session ==="
          echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS:-<unset>}"

      - name: Build desktop (renderer + electron + bundled Pi)
        run: pnpm --filter @ai-devflow/desktop build

      - name: Build unpacked application for matrix architecture
        run: pnpm --filter @ai-devflow/desktop exec electron-builder --dir --${{ matrix.arch }}

      - name: Inspect packaged Pi runtime
        run: |
          set -o pipefail
          node apps/desktop/scripts/verify-packaged-pi.mjs apps/desktop/release | tee pi-runtime-inspection.log

      - name: Run packaged Pi isolation E2E
        if: runner.os != 'Linux'
        run: node apps/desktop/scripts/run-e2e.mjs --packaged apps/desktop/release

      - name: Run packaged Pi isolation E2E with Linux keyring
        if: runner.os == 'Linux'
        run: |
          # xvfb-run 必须在外层：gnome-keyring-daemon 的 SystemPrompter 需要 DISPLAY，
          # 必须先有虚拟 X 再启动 keyring，否则 isEncryptionAvailable=false。
          xvfb-run -a dbus-run-session -- bash -c '
            set -euo pipefail
            export XDG_CURRENT_DESKTOP=GNOME
            eval "$(gnome-keyring-daemon --start --components=secrets)"
            echo "GNOME_KEYRING_CONTROL=${GNOME_KEYRING_CONTROL:-<unset>}"
            printf "%s" "ai-devflow-smoke" | gnome-keyring-daemon --unlock >/dev/null
            echo "DBUS_SESSION_BUS_ADDRESS=${DBUS_SESSION_BUS_ADDRESS:-<unset>}"
            node apps/desktop/scripts/run-e2e.mjs --packaged apps/desktop/release
          '

      - name: Upload redacted Pi inspection log
        uses: actions/upload-artifact@v4
        with:
          name: pi-runtime-inspection-${{ matrix.os }}-${{ matrix.arch }}
          path: pi-runtime-inspection.log
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. 各平台打包（matrix）。--publish never：只产出构件与 updater 元数据，不创建 Release。
  # ---------------------------------------------------------------------------
  build:
    needs: [prepare, pi-runtime-smoke]
    if: github.ref == 'refs/heads/main'
    # Windows runner 默认 shell 为 PowerShell；本 job 的 run 步骤均为 bash 语法，
    # 统一指定 bash（Windows 上用 Git Bash），避免 `if/fi` 等在 pwsh 下解析失败。
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout tag v${{ inputs.version }}
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build desktop (renderer + electron)
        run: pnpm --filter @ai-devflow/desktop build

      - name: Build installers + updater metadata (no publish)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # macOS 官方发版采用 Ad hoc（无证书）签名：关闭 electron-builder 身份自动发现，
          # 由 afterSign 钩子（scripts/ad-hoc-sign.mjs）用 Ad hoc 身份封装 .app bundle。
          # 产物未经公证，用户首次运行需执行 `xattr -d com.apple.quarantine` 放行（见 README 安装说明）。
          if [ "${{ matrix.platform }}" = "mac" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          # --publish never：构建安装包 + blockmap + latest*.yml，但不创建/上传 Release（统一由 publish 阶段发布）。
          pnpm --filter @ai-devflow/desktop dist

      - name: Verify platform artifacts exist
        shell: bash
        run: |
          cd apps/desktop/release
          shopt -s nullglob
          # 注意：模式必须加引号存入数组，否则 nullglob 会在数组构造时把「无匹配」的模式直接展开为空、
          # 从数组中消失，导致漏检（误判通过）。引号内保存字面量，循环内再展开glob逐个校验。
          # Linux x64 的 AppImage 由 electron-builder 命名为 x86_64。
          case "${{ matrix.platform }}" in
            mac)   need=( '*-mac-x64.dmg' '*-mac-arm64.dmg' '*-mac-x64.zip' '*-mac-arm64.zip' 'latest-mac.yml' '*.blockmap' ) ;;
            win)   need=( '*-win-x64.exe' 'latest.yml' '*.blockmap' ) ;;
            linux) need=( '*-linux-x86_64.AppImage' 'latest-linux.yml' ) ;;
          esac
          missing=0
          for pat in "${need[@]}"; do
            files=( $pat )
            if [ ${#files[@]} -eq 0 ]; then
              echo "::error::${{ matrix.platform }} 缺失预期构件: $pat"
              missing=1
            else
              echo "OK (${{ matrix.platform }}): $pat -> ${files[*]}"
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.AppImage
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          if-no-files-found: error # 任一平台构件缺失即失败，绝不静默放过

  # ---------------------------------------------------------------------------
  # 4. 统一发布：汇总三平台构件并校验齐全后，创建唯一一个 GitHub Release。
  # ---------------------------------------------------------------------------
  publish:
    needs: [prepare, build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify full cross-platform artifact set
        shell: bash
        run: |
          cd artifacts
          shopt -s nullglob
          # 模式加引号存入数组（避免 nullglob 在数组构造时把无匹配的模式展开为空而漏检）；循环内再展开校验。
          need=(
            '*-mac-x64.dmg' '*-mac-arm64.dmg' '*-mac-x64.zip' '*-mac-arm64.zip' 'latest-mac.yml'
            '*-win-x64.exe' 'latest.yml'
            '*-linux-x86_64.AppImage' 'latest-linux.yml'
            'RELEASE_NOTES.md'
          )
          missing=0
          for pat in "${need[@]}"; do
            files=( $pat )
            if [ ${#files[@]} -eq 0 ]; then
              echo "::error::发布前缺失预期构件: $pat"
              missing=1
            else
              echo "OK: $pat -> ${files[*]}"
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Create GitHub Release with changelog + attach artifacts
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          cd artifacts
          # Release 正文 = 生成的 Release Notes（与仓库 CHANGELOG 对应小节一致），面向用户。
          gh release create "v${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ inputs.version }}" \
            --verify-tag \
            -F RELEASE_NOTES.md \
            *.dmg *.zip *.exe *.AppImage *.yml *.blockmap
